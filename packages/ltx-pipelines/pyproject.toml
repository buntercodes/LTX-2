[project]
name = "ltx-pipelines"
version = "1.1.2"
description = "Pipelines implementation for Lightricks' LTX-2 model"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["ltx-core", "av", "tqdm", "pillow", "openimageio"]

[project.optional-dependencies]
server = ["fastapi>=0.115", "uvicorn[standard]>=0.34", "python-multipart>=0.0.12", "boto3>=1.35"]

[project.scripts]
ltx-server = "ltx_pipelines.server:main"

[build-system]
requires = ["uv_build>=0.9.8,<0.10.0"]
build-backend = "uv_build"
